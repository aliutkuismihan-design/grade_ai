name: grade_ai
description: "AI exam grading assistant for teachers — scan handwritten papers, upload answer keys, and grade against curriculum rubrics via the Higgs Field AI backend."
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management + DI (Riverpod 2.0)
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Networking → Higgs Field AI REST backend
  dio: ^5.5.0

  # Config / secrets
  flutter_dotenv: ^5.1.0

  # Offline queue support
  connectivity_plus: ^6.0.5
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2

  # Firebase backend
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3

  # Media capture / file selection
  image_picker: ^1.1.2
  file_picker: ^8.0.6

  # Monetization — Google AdMob
  google_mobile_ads: ^5.1.0

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2
  screen_protector: ^1.4.2
  jailbreak_root_detection: ^0.0.7

  # Models / immutability
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # i18n
  intl: any

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Codegen
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # Lints
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true # enables gen_l10n from lib/l10n/*.arb
  assets:
    - .env
