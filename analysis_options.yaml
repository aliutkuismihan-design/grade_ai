include: package:flutter_lints/flutter.yaml

analyzer:
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "lib/src/l10n/app_localizations*.dart"
  language:
    strict-casts: true
    strict-raw-types: true
  plugins:
    - custom_lint

linter:
  rules:
    - prefer_single_quotes
    - require_trailing_commas
    - always_use_package_imports
    - unawaited_futures
